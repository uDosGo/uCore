<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>uCore — Mission Control</title>
    
    <!-- ─── Pico CSS (component framework) ──────────────────────────────── -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
    
    <!-- ─── Google Fonts (Inter, Material Symbols Outlined) ─────────────────
         Use preconnect for performance + explicit font weights
         DO NOT duplicate in CSS @imports — load fonts here only!
         ──────────────────────────────────────────────────────────────────── -->
    
    <!-- Preconnect for better font loading performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Inter: UI font (300, 400, 500, 600, 700 weights for all text) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    
    <!-- Material Symbols Outlined: Icon font (variable weight) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
      rel="stylesheet"
    />
    
    <!-- Press Start 2P: Retro NES-style pixel font for terminal/grid -->
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    
    <!-- MODE7GX3: Authentic Ceefax/Teletext font (1.3:1 aspect, BBC Micro MODE7) -->
    <link
      href="https://fonts.googleapis.com/css2?family=VT323&display=swap"
      rel="stylesheet"
    />
    <style>
      @font-face {
        font-family: 'MODE7GX3';
        src: url('/fonts/MODE7GX3.TTF') format('truetype');
        font-display: block;
        font-weight: normal;
        font-style: normal;
      }
      @font-face {
        font-family: 'Teletext50';
        src: url('/fonts/Teletext50.otf') format('opentype');
        font-display: block;
        font-weight: normal;
        font-style: normal;
      }
    </style>

    <!-- Iconify: Icon library API for MDI and other icon sets -->
    <script src="https://code.iconify.design/iconify-icon/1.0.8/iconify-icon.min.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
